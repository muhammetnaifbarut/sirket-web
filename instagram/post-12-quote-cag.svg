<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#3a2436"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFC0CB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFC0CB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g1)"/>

  <!-- Logo top -->
  <g transform="translate(80, 80) scale(1)">
    <circle cx="30" cy="30" r="28" fill="#ffffff"/>
    <circle cx="30" cy="30" r="11" fill="#714B67"/>
    <circle cx="80" cy="30" r="28" fill="none" stroke="#ffffff" stroke-width="11"/>
    <circle cx="113" cy="2" r="6" fill="#FFC0CB"/>
    <text x="135" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#ffffff">kooza</text>
  </g>

  <!-- Top label -->
  <g transform="translate(540, 280)">
    <rect x="-160" y="-26" width="320" height="52" rx="26" fill="#ffffff" fill-opacity="0.15"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#FFC0CB" text-anchor="middle" letter-spacing="3">⏳ MANİFESTO</text>
  </g>

  <!-- Main text -->
  <text x="540" y="450" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#ffffff" text-anchor="middle">5 farklı yazılıma para</text>
  <text x="540" y="520" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#ffffff" text-anchor="middle">vermenin çağı bitti.</text>

  <!-- Big highlight text -->
  <text x="540" y="680" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#FFC0CB" text-anchor="middle" letter-spacing="-5">Bu çağ bitti.</text>

  <!-- Subtitle -->
  <text x="540" y="790" font-family="Arial, sans-serif" font-weight="500" font-size="28" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">Tek partner. Tek platform. Tek fatura.</text>

  <!-- CTA -->
  <g transform="translate(540, 920)">
    <rect x="-220" y="-40" width="440" height="80" rx="40" fill="#FFC0CB"/>
    <text x="0" y="13" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#714B67" text-anchor="middle">Şimdi başla → kooza.tr</text>
  </g>

  <text x="540" y="1040" font-family="Arial, sans-serif" font-weight="600" font-size="20" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">kooza · Yazılım ve Danışmanlık</text>
</svg>
