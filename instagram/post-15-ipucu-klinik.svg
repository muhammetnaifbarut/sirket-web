<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <circle cx="30" cy="30" r="28" fill="#714B67"/>
    <circle cx="30" cy="30" r="11" fill="#fef2f2"/>
    <circle cx="80" cy="30" r="28" fill="none" stroke="#714B67" stroke-width="11"/>
    <circle cx="113" cy="2" r="6" fill="#FFC0CB"/>
    <text x="135" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1f2937">kooza</text>
  </g>

  <!-- Tip badge -->
  <g transform="translate(540, 240)">
    <rect x="-160" y="-30" width="320" height="60" rx="30" fill="#dc2626"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="2">💡 İŞLETME İPUCU #2</text>
  </g>

  <!-- Question -->
  <text x="540" y="360" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#7f1d1d" text-anchor="middle">Klinik sahipleri</text>

  <!-- Big title -->
  <text x="540" y="450" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#1f2937" text-anchor="middle" letter-spacing="-2">Boş randevu slot'larını</text>
  <text x="540" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#dc2626" text-anchor="middle" letter-spacing="-2">%62 azaltma yolu</text>

  <!-- Steps -->
  <g transform="translate(80, 600)" font-family="Arial, sans-serif">
    <g transform="translate(0, 0)">
      <circle cx="35" cy="35" r="35" fill="#dc2626"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">1</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">Online randevu sistemi açın</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#991b1b">Hasta web/WhatsApp'tan alır</text>
    </g>
    <g transform="translate(0, 110)">
      <circle cx="35" cy="35" r="35" fill="#dc2626"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">2</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">24 saat öncesinden SMS atın</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#991b1b">Otomatik hatırlatma sistemli</text>
    </g>
    <g transform="translate(0, 220)">
      <circle cx="35" cy="35" r="35" fill="#dc2626"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">3</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">İptal varsa hızlı bilgilendir</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#991b1b">Bekleme listesinden otomatik dolar</text>
    </g>
  </g>

  <!-- Bottom -->
  <text x="540" y="990" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#7f1d1d" text-anchor="middle">Kaydet 📌 · Sağlık sektörü ipuçları için takip et</text>
  <text x="540" y="1030" font-family="Arial, sans-serif" font-weight="600" font-size="18" fill="#dc2626" text-anchor="middle">@kooza · kooza.tr</text>
</svg>
