<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <radialGradient id="glow6" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#fef2f2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fef2f2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg6)"/>
  <rect width="1080" height="1080" fill="url(#glow6)"/>

  <!-- KOOZA logo (top-left, white) -->
  <g transform="translate(80, 80) scale(1.2)">
    <circle cx="40" cy="40" r="36" fill="#ffffff"/>
    <circle cx="40" cy="40" r="14" fill="#dc2626"/>
    <circle cx="100" cy="40" r="36" fill="none" stroke="#ffffff" stroke-width="14"/>
    <circle cx="142" cy="6" r="7" fill="#FFC0CB"/>
    <text x="170" y="62" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#ffffff">kooza</text>
  </g>

  <!-- Top icon + label -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="100">🏥</text>
  <text x="220" y="255" font-family="Arial, sans-serif" font-weight="800" font-size="32" fill="#ffffff">KLİNİKLER İÇİN</text>

  <!-- Main message -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#ffffff" letter-spacing="-2">Hasta dosyaları</text>
  <text x="80" y="510" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#ffffff" letter-spacing="-2">hâlâ kâğıtta mı</text>
  <text x="80" y="590" font-family="Arial, sans-serif" font-weight="900" font-size="76" fill="#fecaca" letter-spacing="-2">kayıtlı?</text>

  <!-- Feature tags -->
  <g transform="translate(80, 660)">
    <rect width="290" height="68" rx="34" fill="#ffffff"/>
    <text x="145" y="46" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#dc2626" text-anchor="middle">📋 Hasta Dosyası</text>
  </g>
  <g transform="translate(390, 660)">
    <rect width="220" height="68" rx="34" fill="#ffffff"/>
    <text x="110" y="46" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#dc2626" text-anchor="middle">💊 e-Reçete</text>
  </g>
  <g transform="translate(630, 660)">
    <rect width="180" height="68" rx="34" fill="#ffffff"/>
    <text x="90" y="46" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#dc2626" text-anchor="middle">🆔 MHRS</text>
  </g>

  <!-- Solution -->
  <text x="80" y="820" font-family="Arial, sans-serif" font-weight="700" font-size="40" fill="#ffffff">kooza ile:</text>
  <text x="80" y="900" font-family="Arial, sans-serif" font-weight="900" font-size="58" fill="#fecaca" letter-spacing="-2">→ Tek panelde, dijital.</text>

  <!-- Bottom tag -->
  <g transform="translate(80, 970)">
    <rect width="920" height="74" rx="37" fill="#ffffff" fill-opacity="0.18"/>
    <text x="460" y="48" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff" text-anchor="middle">Randevu · Hasta Dosyası · e-Reçete · MHRS · SGK · Lab</text>
  </g>
</svg>
