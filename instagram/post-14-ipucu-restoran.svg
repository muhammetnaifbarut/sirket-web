<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <circle cx="30" cy="30" r="28" fill="#714B67"/>
    <circle cx="30" cy="30" r="11" fill="#fff7ed"/>
    <circle cx="80" cy="30" r="28" fill="none" stroke="#714B67" stroke-width="11"/>
    <circle cx="113" cy="2" r="6" fill="#FFC0CB"/>
    <text x="135" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1f2937">kooza</text>
  </g>

  <!-- Tip badge -->
  <g transform="translate(540, 240)">
    <rect x="-160" y="-30" width="320" height="60" rx="30" fill="#ea580c"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="2">💡 İŞLETME İPUCU #1</text>
  </g>

  <!-- Question -->
  <text x="540" y="360" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#9a3412" text-anchor="middle">Restoran sahipleri</text>

  <!-- Big title -->
  <text x="540" y="450" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#1f2937" text-anchor="middle" letter-spacing="-2">Kasa açığını nasıl</text>
  <text x="540" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#ea580c" text-anchor="middle" letter-spacing="-2">%85 azaltırsınız?</text>

  <!-- Steps -->
  <g transform="translate(80, 600)" font-family="Arial, sans-serif">
    <g transform="translate(0, 0)">
      <circle cx="35" cy="35" r="35" fill="#ea580c"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">1</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">Tüm satışları sisteme yazın</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#7c2d12">Manuel fiş yok, her şey kayıtlı</text>
    </g>
    <g transform="translate(0, 110)">
      <circle cx="35" cy="35" r="35" fill="#ea580c"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">2</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">Vardiya başında nakit sayın</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#7c2d12">Sistem otomatik karşılaştırır</text>
    </g>
    <g transform="translate(0, 220)">
      <circle cx="35" cy="35" r="35" fill="#ea580c"/>
      <text x="35" y="50" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">3</text>
      <text x="100" y="30" font-weight="800" font-size="28" fill="#1f2937">Z raporu otomatik gelir</text>
      <text x="100" y="62" font-weight="500" font-size="20" fill="#7c2d12">Ay sonu açık sıfıra yakın</text>
    </g>
  </g>

  <!-- Bottom -->
  <text x="540" y="990" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#9a3412" text-anchor="middle">Kaydet 📌 · Sektörünüzdeki ipuçları için takip et</text>
  <text x="540" y="1030" font-family="Arial, sans-serif" font-weight="600" font-size="18" fill="#ea580c" text-anchor="middle">@kooza · kooza.tr</text>
</svg>
