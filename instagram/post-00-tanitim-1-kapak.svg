<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#3a2436"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.1" cy="0.9" r="0.5">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g1)"/>
  <rect width="1080" height="1080" fill="url(#g2)"/>

  <!-- Tagline at top -->
  <g transform="translate(540, 130)">
    <rect x="-220" y="-26" width="440" height="52" rx="26" fill="#ffffff" fill-opacity="0.15"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#ffffff" text-anchor="middle" letter-spacing="3">👋 TANIŞALIM — BİZ KOOZA</text>
  </g>

  <!-- Big logo center -->
  <g transform="translate(540, 470)">
    <g transform="translate(-180, -90)">
      <circle cx="60" cy="60" r="54" fill="#ffffff"/>
      <circle cx="60" cy="60" r="22" fill="#714B67"/>
      <circle cx="150" cy="60" r="54" fill="none" stroke="#ffffff" stroke-width="20"/>
      <circle cx="212" cy="10" r="11" fill="#FFC0CB"/>
    </g>
    <text x="0" y="180" font-family="Arial Black, sans-serif" font-weight="900" font-size="170" fill="#ffffff" text-anchor="middle" letter-spacing="-6">kooza</text>
    <text x="0" y="240" font-family="Arial, sans-serif" font-weight="600" font-size="36" fill="#FFC0CB" text-anchor="middle" letter-spacing="2">Yazılım ve Danışmanlık</text>
  </g>

  <!-- Bottom hook -->
  <text x="540" y="870" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="#ffffff" text-anchor="middle">İşletmenizin</text>
  <text x="540" y="930" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="#FFC0CB" text-anchor="middle" letter-spacing="-1">tek dijital partneri.</text>

  <!-- Swipe arrow -->
  <g transform="translate(540, 1020)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-weight="700" font-size="24" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Kaydır →</text>
  </g>
</svg>
