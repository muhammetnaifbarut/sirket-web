<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#714B67" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#714B67" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g)"/>

  <!-- Logo -->
  <g transform="translate(80, 80) scale(1.2)">
    <circle cx="40" cy="40" r="36" fill="#ffffff"/>
    <circle cx="40" cy="40" r="14" fill="#0f172a"/>
    <circle cx="100" cy="40" r="36" fill="none" stroke="#ffffff" stroke-width="14"/>
    <circle cx="142" cy="6" r="7" fill="#FFC0CB"/>
    <text x="170" y="62" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#ffffff">kooza</text>
  </g>

  <text x="540" y="290" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#FFC0CB" text-anchor="middle" letter-spacing="3">VAADİMİZ</text>

  <text x="540" y="410" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Tek partnerden,</text>
  <text x="540" y="500" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#FFC0CB" text-anchor="middle" letter-spacing="-3">uçtan uca.</text>

  <!-- 4 promise items -->
  <g transform="translate(80, 600)" font-family="Arial, sans-serif">
    <g transform="translate(0, 0)">
      <text x="0" y="40" font-size="36">✓</text>
      <text x="60" y="40" font-weight="700" font-size="28" fill="#ffffff">Şeffaf fiyat — sürpriz fatura yok</text>
    </g>
    <g transform="translate(0, 80)">
      <text x="0" y="40" font-size="36">✓</text>
      <text x="60" y="40" font-weight="700" font-size="28" fill="#ffffff">Türk mevzuatı — KVKK, e-Fatura, GİB</text>
    </g>
    <g transform="translate(0, 160)">
      <text x="0" y="40" font-size="36">✓</text>
      <text x="60" y="40" font-weight="700" font-size="28" fill="#ffffff">7/24 Türkçe destek — gerçek insan</text>
    </g>
    <g transform="translate(0, 240)">
      <text x="0" y="40" font-size="36">✓</text>
      <text x="60" y="40" font-weight="700" font-size="28" fill="#ffffff">İlk ay ücretsiz — risk almadan dene</text>
    </g>
  </g>

  <!-- CTA banner -->
  <g transform="translate(540, 970)">
    <rect x="-340" y="-45" width="680" height="90" rx="45" fill="#FFC0CB"/>
    <text x="0" y="14" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="#0f172a" text-anchor="middle">Bugün başla → kooza.tr</text>
  </g>
</svg>
