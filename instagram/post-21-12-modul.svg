<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f0f3"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Logo -->
  <g transform="translate(80, 70)">
    <circle cx="30" cy="30" r="28" fill="#714B67"/>
    <circle cx="30" cy="30" r="11" fill="#fafafa"/>
    <circle cx="80" cy="30" r="28" fill="none" stroke="#714B67" stroke-width="11"/>
    <circle cx="113" cy="2" r="6" fill="#FFC0CB"/>
    <text x="135" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1f2937">kooza</text>
  </g>

  <text x="540" y="200" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#714B67" text-anchor="middle" letter-spacing="3">TEK PLATFORM, 12 MODÜL</text>

  <text x="540" y="280" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#1f2937" text-anchor="middle" letter-spacing="-2">Şirketinizin tüm</text>
  <text x="540" y="350" font-family="Arial Black, sans-serif" font-weight="900" font-size="68" fill="#714B67" text-anchor="middle" letter-spacing="-2">dijital ihtiyaçları.</text>

  <!-- 12 modules grid 3x4 -->
  <g transform="translate(80, 420)" font-family="Arial, sans-serif">
    <!-- Row 1 -->
    <g transform="translate(0, 0)"><rect width="295" height="120" rx="14" fill="#714B67"/><text x="20" y="40" font-size="32">🌐</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Web Sitesi</text><text x="20" y="80" font-weight="500" font-size="13" fill="#FFC0CB">Kurumsal · E-ticaret</text></g>
    <g transform="translate(310, 0)"><rect width="295" height="120" rx="14" fill="#dc2626"/><text x="20" y="40" font-size="32">🏥</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Klinik</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fecaca">e-Reçete · MHRS</text></g>
    <g transform="translate(620, 0)"><rect width="295" height="120" rx="14" fill="#ea580c"/><text x="20" y="40" font-size="32">🍽️</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Restoran</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fed7aa">Adisyon · Kurye</text></g>
    <!-- Row 2 -->
    <g transform="translate(0, 135)"><rect width="295" height="120" rx="14" fill="#16a34a"/><text x="20" y="40" font-size="32">🛒</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Market</text><text x="20" y="80" font-weight="500" font-size="13" fill="#bbf7d0">Barkod · Stok</text></g>
    <g transform="translate(310, 135)"><rect width="295" height="120" rx="14" fill="#4f46e5"/><text x="20" y="40" font-size="32">🎓</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Eğitim</text><text x="20" y="80" font-weight="500" font-size="13" fill="#c7d2fe">Sınav · Veli portal</text></g>
    <g transform="translate(620, 135)"><rect width="295" height="120" rx="14" fill="#0891b2"/><text x="20" y="40" font-size="32">👥</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">İK</text><text x="20" y="80" font-weight="500" font-size="13" fill="#cffafe">Bordro · İzin</text></g>
    <!-- Row 3 -->
    <g transform="translate(0, 270)"><rect width="295" height="120" rx="14" fill="#059669"/><text x="20" y="40" font-size="32">🧾</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Muhasebe</text><text x="20" y="80" font-weight="500" font-size="13" fill="#a7f3d0">e-Fatura · GİB</text></g>
    <g transform="translate(310, 270)"><rect width="295" height="120" rx="14" fill="#d97706"/><text x="20" y="40" font-size="32">📦</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Stok</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fde68a">Çoklu depo · FIFO</text></g>
    <g transform="translate(620, 270)"><rect width="295" height="120" rx="14" fill="#db2777"/><text x="20" y="40" font-size="32">👤</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">CRM</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fbcfe8">Pipeline · Teklif</text></g>
    <!-- Row 4 -->
    <g transform="translate(0, 405)"><rect width="295" height="120" rx="14" fill="#e11d48"/><text x="20" y="40" font-size="32">📣</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Pazarlama</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fecdd3">Email · SMS · WhatsApp</text></g>
    <g transform="translate(310, 405)"><rect width="295" height="120" rx="14" fill="#2563eb"/><text x="20" y="40" font-size="32">📅</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Randevu</text><text x="20" y="80" font-weight="500" font-size="13" fill="#bfdbfe">Online · SMS hatırlatma</text></g>
    <g transform="translate(620, 405)"><rect width="295" height="120" rx="14" fill="#ca8a04"/><text x="20" y="40" font-size="32">💡</text><text x="65" y="40" font-weight="800" font-size="18" fill="#ffffff">Danışmanlık</text><text x="20" y="80" font-weight="500" font-size="13" fill="#fef08a">Süreç analizi · Eğitim</text></g>
