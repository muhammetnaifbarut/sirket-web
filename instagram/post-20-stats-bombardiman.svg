<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#3a2436"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFC0CB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFC0CB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g)"/>

  <!-- Logo -->
  <g transform="translate(80, 80) scale(1.2)">
    <circle cx="40" cy="40" r="36" fill="#ffffff"/>
    <circle cx="40" cy="40" r="14" fill="#714B67"/>
    <circle cx="100" cy="40" r="36" fill="none" stroke="#ffffff" stroke-width="14"/>
    <circle cx="142" cy="6" r="7" fill="#FFC0CB"/>
    <text x="170" y="62" font-family="Arial Black, sans-serif" font-weight="900" font-size="62" fill="#ffffff">kooza</text>
  </g>

  <text x="540" y="280" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#FFC0CB" text-anchor="middle" letter-spacing="3">RAKAMLAR KONUŞSUN</text>

  <text x="540" y="380" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="-3">2026'da kooza:</text>

  <!-- 4 stat boxes in 2x2 grid -->
  <g transform="translate(80, 460)">
    <!-- Top left -->
    <g transform="translate(0, 0)">
      <rect width="450" height="240" rx="24" fill="#ffffff" fill-opacity="0.1"/>
      <text x="225" y="120" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#FFC0CB" text-anchor="middle" letter-spacing="-4">500+</text>
      <text x="225" y="180" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff" text-anchor="middle">Aktif İşletme</text>
    </g>
    <!-- Top right -->
    <g transform="translate(470, 0)">
      <rect width="450" height="240" rx="24" fill="#ffffff" fill-opacity="0.1"/>
      <text x="225" y="120" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#FFC0CB" text-anchor="middle" letter-spacing="-4">12</text>
      <text x="225" y="180" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff" text-anchor="middle">Sektörel Modül</text>
    </g>
    <!-- Bottom left -->
    <g transform="translate(0, 270)">
      <rect width="450" height="240" rx="24" fill="#ffffff" fill-opacity="0.1"/>
      <text x="225" y="120" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#FFC0CB" text-anchor="middle" letter-spacing="-4">%98.7</text>
      <text x="225" y="180" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff" text-anchor="middle">Memnuniyet</text>
    </g>
    <!-- Bottom right -->
    <g transform="translate(470, 270)">
      <rect width="450" height="240" rx="24" fill="#ffffff" fill-opacity="0.1"/>
      <text x="225" y="120" font-family="Arial Black, sans-serif" font-weight="900" font-size="120" fill="#FFC0CB" text-anchor="middle" letter-spacing="-4">24/7</text>
      <text x="225" y="180" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff" text-anchor="middle">Türkçe Destek</text>
    </g>
  </g>

  <text x="540" y="1030" font-family="Arial, sans-serif" font-weight="600" font-size="22" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Sen de katıl → kooza.tr</text>
</svg>
