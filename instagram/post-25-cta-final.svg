<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#3a2436"/>
    </linearGradient>
    <radialGradient id="g" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFC0CB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFC0CB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#g)"/>

  <!-- Big logo top -->
  <g transform="translate(540, 230)">
    <g transform="translate(-180, -75)">
      <circle cx="50" cy="50" r="45" fill="#ffffff"/>
      <circle cx="50" cy="50" r="18" fill="#714B67"/>
      <circle cx="125" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="17"/>
      <circle cx="178" cy="8" r="9" fill="#FFC0CB"/>
    </g>
    <text x="0" y="130" font-family="Arial Black, sans-serif" font-weight="900" font-size="140" fill="#ffffff" text-anchor="middle" letter-spacing="-5">kooza</text>
    <text x="0" y="180" font-family="Arial, sans-serif" font-weight="600" font-size="28" fill="#FFC0CB" text-anchor="middle" letter-spacing="2">Yazılım ve Danışmanlık</text>
  </g>

  <!-- Big text -->
  <text x="540" y="560" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Bugün başla,</text>
  <text x="540" y="630" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#FFC0CB" text-anchor="middle" letter-spacing="-2">yarın fark yarat.</text>

  <!-- Arrow -->
  <text x="540" y="730" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="#FFC0CB" text-anchor="middle">↓</text>

  <!-- Big CTA -->
  <g transform="translate(540, 830)">
    <rect x="-380" y="-55" width="760" height="110" rx="55" fill="#FFC0CB"/>
    <text x="0" y="20" font-family="Arial Black, sans-serif" font-weight="900" font-size="40" fill="#714B67" text-anchor="middle">kooza.tr</text>
  </g>

  <!-- Bottom hash -->
  <text x="540" y="970" font-family="Arial, sans-serif" font-weight="600" font-size="22" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Ücretsiz keşif görüşmesi · 30 dakika · Sıfır risk</text>
  <text x="540" y="1030" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#FFC0CB" text-anchor="middle">Takip et @kooza</text>
</svg>
