<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f0f3"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Decorative corner -->
  <circle cx="100" cy="100" r="200" fill="#714B67" fill-opacity="0.05"/>
  <circle cx="980" cy="980" r="280" fill="#714B67" fill-opacity="0.05"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <circle cx="30" cy="30" r="28" fill="#714B67"/>
    <circle cx="30" cy="30" r="11" fill="#fafafa"/>
    <circle cx="80" cy="30" r="28" fill="none" stroke="#714B67" stroke-width="11"/>
    <circle cx="113" cy="2" r="6" fill="#FFC0CB"/>
    <text x="135" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="44" fill="#1f2937">kooza</text>
  </g>

  <!-- Quote mark -->
  <text x="540" y="370" font-family="Georgia, serif" font-weight="900" font-size="180" fill="#714B67" text-anchor="middle">"</text>

  <!-- Main quote -->
  <text x="540" y="500" font-family="Arial, sans-serif" font-weight="800" font-size="56" fill="#1f2937" text-anchor="middle">Siz işinize odaklanın,</text>
  <text x="540" y="580" font-family="Arial Black, sans-serif" font-weight="900" font-size="76" fill="#714B67" text-anchor="middle" letter-spacing="-2">gerisini biz halledelim.</text>

  <!-- Sub features -->
  <g transform="translate(540, 720)" font-family="Arial, sans-serif" fill="#6b7280">
    <text x="-340" y="0" font-weight="600" font-size="22" text-anchor="middle">🌐</text>
    <text x="-340" y="40" font-weight="700" font-size="18" text-anchor="middle">Web Sitesi</text>

    <text x="-170" y="0" font-weight="600" font-size="22" text-anchor="middle">🤖</text>
    <text x="-170" y="40" font-weight="700" font-size="18" text-anchor="middle">Otomasyon</text>

    <text x="0" y="0" font-weight="600" font-size="22" text-anchor="middle">👥</text>
    <text x="0" y="40" font-weight="700" font-size="18" text-anchor="middle">İnsan Kaynakları</text>

    <text x="170" y="0" font-weight="600" font-size="22" text-anchor="middle">💼</text>
    <text x="170" y="40" font-weight="700" font-size="18" text-anchor="middle">Muhasebe</text>

    <text x="340" y="0" font-weight="600" font-size="22" text-anchor="middle">💡</text>
    <text x="340" y="40" font-weight="700" font-size="18" text-anchor="middle">Danışmanlık</text>
  </g>

  <!-- Divider -->
  <line x1="450" y1="850" x2="630" y2="850" stroke="#714B67" stroke-width="2"/>

  <!-- Bottom -->
  <text x="540" y="920" font-family="Arial, sans-serif" font-weight="600" font-size="22" fill="#6b7280" text-anchor="middle">İşletmelerin tek dijital partneri</text>
  <text x="540" y="980" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#714B67" text-anchor="middle">kooza.tr · Yazılım ve Danışmanlık</text>
</svg>
